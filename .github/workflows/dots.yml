name: Generate Moving Dots

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate SVG
        run: |
          mkdir -p output

          echo '<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
          <rect width="100%" height="100%" fill="#02000e"/>

          <circle r="4" fill="#a855f7">
            <animateMotion dur="10s" repeatCount="indefinite"
            path="M0,100 C200,0 600,200 800,100"/>
          </circle>

          <circle r="3" fill="#ff4ecd">
            <animateMotion dur="12s" repeatCount="indefinite"
            path="M800,50 C600,200 200,0 0,150"/>
          </circle>

          <circle r="3" fill="#7c3aed">
            <animateMotion dur="8s" repeatCount="indefinite"
            path="M0,150 C300,0 500,200 800,50"/>
          </circle>

          </svg>' > output/dots.svg

      - name: Commit and push
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add output/dots.svg
          git commit -m "update dots animation" || echo "no changes"
          git push
