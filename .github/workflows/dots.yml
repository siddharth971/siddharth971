name: Generate Moving Dots

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Generate SVG animation
        run: |
          mkdir -p output

          cat << 'EOF' > output/dots.svg
          <svg width="100%" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
            <rect width="100%" height="100%" fill="#02000e"/>

            <!-- moving dots -->
            <circle r="4" fill="#a855f7">
              <animateMotion dur="10s" repeatCount="indefinite"
                path="M0,100 C200,0 600,200 800,100"/>
            </circle>

            <circle r="3" fill="#ff4ecd">
              <animateMotion dur="12s" repeatCount="indefinite"
                path="M800,50 C600,200 200,0 0,150"/>
            </circle>

            <circle r="3" fill="#7c3aed">
              <animateMotion dur="8s" repeatCount="indefinite"
                path="M0,150 C300,0 500,200 800,50"/>
            </circle>

            <circle r="4" fill="#c4b5fd">
              <animateMotion dur="9s" repeatCount="indefinite"
                path="M800,120 C500,20 200,180 0,60"/>
            </circle>
          </svg>
          EOF

      - name: Commit animation
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add output/dots.svg
          git commit -m "update dots animation" || exit 0
          git push
